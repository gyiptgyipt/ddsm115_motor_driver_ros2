dsm115_motor_driver:
  ros__parameters:
    port_name: "/dev/ttyUSB0"
    wheel_names:
      - "front_left_wheel"
      - "front_right_wheel"
      - "rear_left_wheel"
      - "rear_right_wheel"
    wheel_ids: [1, 2, 3, 4]
    wheel_directions:
      - "forward"
      - "backward"
      - "forward"
      - "backward"
